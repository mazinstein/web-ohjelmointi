<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dynamic Menu</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }

        #nav-lista {
            list-style-type: none;
            padding: 0;
            margin: 0;
            background-color: #333;
            overflow: hidden;
        }

        #nav-lista li {
            float: left;
        }

        #nav-lista li a {
            display: block;
            color: white;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
        }

        #nav-lista li a:hover {
            background-color: #111;
        }

        .active {
            background-color: #04AA6D !important;
        }
    </style>
</head>
<body>

    <h1>Website</h1>

    <nav>
        <ul id="nav-lista"></ul>
    </nav>

    <div style="margin-top: 20px; padding: 10px; border: 1px solid #ccc;">
        <h3>Page Content</h3>
        <p>This is an example of dynamic navigation.</p>
    </div>

    <script>
      
        const sivut = [
            { nimi: "Home", url: "navigaatio.html" },
            { nimi: "Products", url: "products.html" },
            { nimi: "Contact", url: "contact.html" }
        ];

 
        const nykyinenSivu = window.location.pathname.split("/").pop();

      
        const navUl = document.getElementById("nav-lista");

       
        sivut.forEach(function(sivu) {

            let activeClass = "";
            if (sivu.url === nykyinenSivu) {
                activeClass = "active";
            }

            navUl.innerHTML += 
                `<li><a href="${sivu.url}" class="${activeClass}">${sivu.nimi}</a></li>`;
        });
    </script>

</body>
</html>
